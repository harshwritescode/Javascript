<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React</title>
</head>
<body>
    <button id="button">Button Clicked</button>
</body>
<script>
   class React{
    constructor(){
        this.library="React"
        this.server="https://localhost:3000"

        //requiremnent
        document.querySelector('#button').addEventListener('click',this.handleClick.bind(this));
    }

  
    handleClick(){         
        console.log("Button clicked");
        console.log(this.server);
        
     }
   }

   const app =new React();
</script>
</html>

<!-- Note   Yeh turant function call kar deta hai (page load hote hi), click pe nahi. -->
