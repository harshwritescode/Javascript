<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoM 4 Manipulation</title>
</head>
<body style="background-color:black; color:white;">
      <ul class="language">
          <li>Javascript</li>
      </ul>
  
</body>
<script>
//--------------------------------------ADD the new Element-------------------------
//Problem is that every time it traverse the whole tree
  function addLanguage(langName){
      const li=document.createElement('li');
      li.innerHTML=`${langName}`;
      document.querySelector('.language').appendChild(li);
  }
  addLanguage('Python')
  addLanguage('TypeScript')
  addLanguage('Java')


  //This is Optimized approach to create a element
  function addoptimizedLanguage(langName){
     const li=document.createElement('li');
     li.appendChild(document.createTextNode(`${langName}`))
     document.querySelector('.language').appendChild(li);
  }
  addoptimizedLanguage('C');
  addoptimizedLanguage('C++');
   addoptimizedLanguage('PhP');


function addDivElement(newDivElement){
   const div=document.createElement('div');
   //div.innerHTML=`${newDivElement}`;
   div.appendChild(document.createTextNode(`${newDivElement}`))
   document.querySelector('body').appendChild(div);
}
addDivElement('NEW DIV BLOCK')
