<!DOCTYPE html>
<html lang="en">

<!-- 
🌳 DOM STRUCTURE (Top to Bottom)

window
 └── document
     └── html
         ├── head
         │   ├── meta
         │   ├── meta
         │   ├── title
         │   └── style
         │
         └── body
             ├── h1#title
             ├── p.text
             ├── p.text
             ├── div#container
             │   ├── p.text
             │   └── p.text
             ├── input#inputField
             ├── button#btn
             ├── ul#list
             │   ├── li
             │   └── li
             └── script

📌 IMPORTANT NOTES:
- window → top-level object (browser)
- document → represents the entire HTML page
- html → root element
- head → contains metadata, title, CSS (not visible)
- body → contains visible UI elements

📌 NODE TYPES:
✔ Element Node → h1, p, div, ul, li
✔ Text Node → "DOM Manipulation 🚀"
✔ Attribute Node → id, class, type

📌 RELATIONSHIPS:
- Parent → contains child elements
- Child → inside a parent
- Siblings → elements at same level
-->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Learning</title>

    <style>
        /*
        📌 CSS is also part of the DOM (style node)

        body → parent selector
        .box & .highlight → class selectors

        These styles are applied to DOM elements
        */

        body {
            font-family: Arial;
            padding: 20px;
        }

        .box {
            padding: 10px;
            margin: 10px 0;
            background-color: lightblue;
        }

        .highlight {
            background-color: yellow;
        }
    </style>
</head>

<body>

    <!-- 
    📌 Heading Element
    Parent: body
    Child: Text Node
    -->
    <h1 id="title">DOM Manipulation 🚀</h1>

    <!-- 
    📌 Paragraph Elements (Siblings)
    Both are at the same level → siblings
    -->
    <p class="text">This is paragraph 1</p>
    <p class="text">This is paragraph 2</p>

    <!-- 
    📌 Container Div
    Parent: body
    Children: two paragraph elements
    -->
    <div id="container">
       <p class="text">This is paragraph container</p>
       <p class="text">This is paragraph container2</p>
    </div>

    <!-- 
    📌 Input Field
    Attributes:
    - type
    - id
    - placeholder
    -->
    <input type="text" id="inputField" placeholder="Type something..." />

    <!-- 
    📌 Button Element
    Used for event handling in JavaScript
    -->
    <button id="btn">Click Me</button>

    <!-- 
    📌 List Structure
    ul → parent
    li → child elements
    -->
    <ul id="list">
        <li>Item 1</li>
        <li>Item 2</li>
    </ul>

    <!-- 
    📌 Script Node
    External JavaScript file is linked here
    JS interacts with DOM from here
    -->
    <script>
          // For id Manipulation
            const value=document.getElementById('title');
            console.log(value);
            const newvalue=value.setAttribute('class','my-intutition');
            console.log(newvalue);
             value.style.backgroundColor="red";
            
          // For class Manipulation
             const element=document.getElementsByClassName('text');
             console.log(element.length);  // it give us length of 4 in all documents whose element==4 they return the whole not length of text
             console.log(element); // HTMLCollection(4) [p.text, p.text, p.text, p.text]
            
             // if we find the first text element so how we do that
               const newusingleelement=document.getElementsByClassName('text')[0];
               console.log(newusingleelement);  // <p class="text">This is paragraph container</p>
             // second method using query selector
               const getfirstQuery = document.querySelector('.text');
               console.log(getfirstQuery);  //<p class="text">This is paragraph container</p>
             // all values  
               const getAllQuery = document.querySelectorAll('.text');
               console.log(getAllQuery);   //NodeList(4) [p.text, p.text, p.text, p.text]
               const arrayvalues=Array.from(getAllQuery);
               console.log(arrayvalues);  //(4) [p.text, p.text, p.text, p.text]
               console.log(arrayvalues[0]);  // <p class="text">This is paragraph 1 </p>
               
               

     /*  Note: HTMLList and NodeList both Output are same 
       What is the difference between that ??  
           
       
| Feature       | NodeList             | HTMLCollection             |
| ------------- | -------------------- | -------------------------- |
| Return by     | `querySelectorAll()` | `getElementsByClassName()` |
| Type          | Static (fix)         | Live (auto update)         |
| Array methods | ❌ direct nahi        | ❌                          |
| forEach       | ✅ supported          | ❌                          |


   NodeList (Static)  --   If we add in the DOM "".text" then list will not be updated
   HTMLCollection (Live) -- If we add in the DOM "".text" then list will  be updated

   How to accessed
    1)console.log(getAllQuery[0]); // first element
    2)getAllQuery.forEach((el) => {
     console.log(el.innerText);
    });

   */
    const listElement = document.querySelectorAll('#list li')
    console.log(listElement);
    // const changeBorder= listElement[0].style.backgroundColor ="blue";
    // console.log(changeBorder);

    listElement.forEach((listitem)=>{
        listitem.style.backgroundColor="green";
    }); // both are green
    
    
            
               

             


    </script>

</body>
</html>
