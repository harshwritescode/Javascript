<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Projects</title>
</head>
<body>
    <h1>Harsh Writes With Code</h1>
    <button id="stop">Stop</button>
</body>
<script>
        const changeText = function (){
document.querySelector('h1').innerHTML='Best Developer' 
    }
    

        setInterval(function (){
       console.log("Harsh2");  // run infinite time   
    },2000)

     const stopExecution= setTimeout(changeText,2000) // occur only one time

    document.getElementById('stop').addEventListener('click',function(){
       clearTimeout(stopExecution)
       console.log("STOPPED");
       
    },false);
</script>
</html>
