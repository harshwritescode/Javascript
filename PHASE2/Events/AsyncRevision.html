<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Projects</title>
</head>
<body>
    <h1>Harsh Writes With Code</h1>
    <button id="start">Start</button>
    <button id="stop">Stop</button>
</body>
<script>
    const sayDate =function(str){
          console.log(str,Date.now());
    }
let intervalId;  // 👈 yaha store hoga


document.querySelector('#start').addEventListener('click', function() {
    intervalId = setInterval(sayDate, 1000, "Harsh");
});

document.querySelector('#stop').addEventListener('click', function() {
    console.log("Events Clicked");
    clearInterval(intervalId); // 👈 ab ye kaam karega
});
  // setInterval(sayDate,1000);  
    //   const intervalId= setInterval(sayDate,1000,"hii");
    //  clearInterval(intervalId);
</script>
</html>
