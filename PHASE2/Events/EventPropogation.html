<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events in Javascript</title>

    <style>
        /* ===============================
           🎨 BASIC PAGE STYLING
        =============================== */
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
        }

        h2 {
            margin-top: 20px;
        }

        /* ===============================
           📦 IMAGE GRID LAYOUT
        =============================== */
        .images {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
            list-style: none;
        }

        .images li {
            overflow: hidden;
            border-radius: 10px;
        }

        /* ===============================
           🖼️ IMAGE STYLING
        =============================== */
        .images img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.3s ease;
            border-radius: 10px;
        }

        /* Hover Effect */
        .images img:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body>

<h2>Amazing Images Gallery</h2>

<div>
    <ul class="images">
        <li><img id="img2" src="https://picsum.photos/id/1016/400/300" alt="River Landscape"></li>
        <li><img id="img3" src="https://picsum.photos/id/1018/400/300" alt="Forest Trees"></li>
        <li><img id="img4" src="https://picsum.photos/id/1020/400/300" alt="Desert Sand"></li>
        <li><img id="img5" src="https://picsum.photos/id/1024/400/300" alt="Cute Dog"></li>
        <li><img id="img6" src="https://picsum.photos/id/1027/400/300" alt="Sunset Beach"></li>
        <li><img id="img7" src="https://picsum.photos/id/1035/400/300" alt="Mountain Lake"></li>
        <li><img id="img8" src="https://picsum.photos/id/1039/400/300" alt="Foggy Road"></li>
        <li><img id="img9" src="https://picsum.photos/id/1043/400/300" alt="City Skyline"></li>
        <li><img id="img10" src="https://picsum.photos/id/1050/400/300" alt="Snow Mountains"></li>

        <!-- Example link -->
        <li><a href="https://www.google.com/">Go to Google</a></li>
    </ul>
</div>

<script>
/*
========================================
📘 JAVASCRIPT EVENTS - NOTES
========================================
*/

// ==========================
// Event Listener & Event Object
// ==========================
document.getElementById('img2').addEventListener('click', function(e) {
    console.log("Full Event Object:", e);
    console.log("Event Type:", e.type); 
    console.log("Event Target:", e.target);
    console.log("Current Target:", e.currentTarget);
    console.log("ClientX, ClientY:", e.clientX, e.clientY);
    console.log("ScreenX, ScreenY:", e.screenX, e.screenY);
    console.log("Ctrl, Shift, Alt:", e.ctrlKey, e.shiftKey, e.altKey);
}, true); // true → capturing phase

/*
========================================
Event Propagation
========================================
- Bubbling (default) → Event moves from child → parent
- Capturing → Event moves from parent → child
- addEventListener(type, callback, useCapture)
  useCapture = true → capturing
  useCapture = false → bubbling
*/


// ==========================
// preventDefault() Example
// ==========================

// Select the Google link
const googleLink = document.querySelector('.images a');

googleLink.addEventListener('click', function(e) {
    e.preventDefault(); // Stops the browser from navigating
    alert("preventDefault() used! Link won't open.");
});

/*
💡 Why preventDefault()?
- Stops browser's default behavior (like link navigation or form submission)
- Useful when you want to handle action manually via JavaScript
- Example use cases:
    • Single-page applications (SPA) link routing
    • Form validation before submission
    • Custom drag & drop or game interactions
*/

</script>
</body>
</html>
