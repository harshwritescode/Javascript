<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remove Images in Javascript</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        text-align: center;
    }

    h2 {
        margin-top: 20px;
    }

    .images {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        padding: 20px;
        list-style: none;
    }

    .images li {
        overflow: hidden;
        border-radius: 10px;
    }

    .images img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        transition: transform 0.3s ease;
        border-radius: 10px;
    }

    .images img:hover {
        transform: scale(1.1);
    }
</style>
</head>

<body>

<h2>Amazing Images Gallery</h2>

<div>
    <ul class="images">
        <li><img id="img2" src="https://picsum.photos/id/1016/400/300" alt="River Landscape"></li>
        <li><img id="img3" src="https://picsum.photos/id/1018/400/300" alt="Forest Trees"></li>
        <li><img id="img4" src="https://picsum.photos/id/1020/400/300" alt="Desert Sand"></li>
        <li><img id="img5" src="https://picsum.photos/id/1024/400/300" alt="Cute Dog"></li>
        <li><img id="img6" src="https://picsum.photos/id/1027/400/300" alt="Sunset Beach"></li>
        <li><img id="img7" src="https://picsum.photos/id/1035/400/300" alt="Mountain Lake"></li>
        <li><img id="img8" src="https://picsum.photos/id/1039/400/300" alt="Foggy Road"></li>
        <li><img id="img9" src="https://picsum.photos/id/1043/400/300" alt="City Skyline"></li>
        <li><img id="img10" src="https://picsum.photos/id/1050/400/300" alt="Snow Mountains"></li>

        <!-- Google Link -->
        <li><a href="https://www.google.com/">Go to Google</a></li>
    </ul>
</div>

<script>
const gallery = document.querySelector('.images');

gallery.addEventListener('click', function(e) {
    const clicked = e.target;

    if (clicked.tagName === 'IMG') {
        // ✅ If an image is clicked, remove only that image's <li>
        clicked.parentNode.remove();
    }
    else if (clicked.tagName === 'A') {
        // ✅ If the link is clicked, remove ALL images
        e.preventDefault(); // stop navigation
        const allImages = gallery.querySelectorAll('li img');
        allImages.forEach(img => img.parentNode.remove());
    }
});
</script>

</body>
</html>
