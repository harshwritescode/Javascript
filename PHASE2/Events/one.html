<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events in Javascript</title>

    <style>
        /* ===============================
           🎨 BASIC PAGE STYLING
        =============================== */
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
        }

        h2 {
            margin-top: 20px;
        }

        /* ===============================
           📦 IMAGE GRID LAYOUT
        =============================== */
        .images {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
            list-style: none;
        }

        .images li {
            overflow: hidden;
            border-radius: 10px;
        }

        /* ===============================
           🖼️ IMAGE STYLING
        =============================== */
        .images img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.3s ease;
            border-radius: 10px;
        }

        /* Hover Effect */
        .images img:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <h2>Amazing Images Gallery</h2>

    <div>
        <ul class="images">

            <!-- ❌ Inline event (Not recommended) -->
            <!-- <li>
                <img src="https://picsum.photos/id/1015/400/300"
                     onclick="alert('Great Image')">
            </li> -->

            <li><img id="img2" src="https://picsum.photos/id/1016/400/300" alt="River Landscape"></li>
            <li><img id="img3" src="https://picsum.photos/id/1018/400/300" alt="Forest Trees"></li>
            <li><img id="img4" src="https://picsum.photos/id/1020/400/300" alt="Desert Sand"></li>
            <li><img id="img5" src="https://picsum.photos/id/1024/400/300" alt="Cute Dog"></li>
            <li><img id="img6" src="https://picsum.photos/id/1027/400/300" alt="Sunset Beach"></li>
            <li><img id="img7" src="https://picsum.photos/id/1035/400/300" alt="Mountain Lake"></li>
            <li><img id="img8" src="https://picsum.photos/id/1039/400/300" alt="Foggy Road"></li>
            <li><img id="img9" src="https://picsum.photos/id/1043/400/300" alt="City Skyline"></li>
            <li><img id="img10" src="https://picsum.photos/id/1050/400/300" alt="Snow Mountains"></li>

            <!-- Example link -->
            <li><a href="https://www.google.com/">Go to Google</a></li>

        </ul>
    </div>

<script>
/*
========================================
📘 JAVASCRIPT EVENTS - COMPLETE NOTES
========================================

1️⃣ What are Events?
- Events are actions or occurrences that happen in the browser.
- Can be triggered by:
    a) User actions → click, hover, keypress
    b) Browser actions → load, resize, scroll

2️⃣ Why Events are important?
- Allows interactivity on web pages.
- Lets us respond to user input.
- Helps in creating dynamic UI.

*/

// ==========================================
// ❌ 1. Using .onclick (Not Recommended)
// ==========================================
// Problems:
// - Only one event handler can be attached
// - Overwrites any previous handler
// - Harder to maintain & scale

// document.getElementById('img2').onclick = function () {
//     alert("Image clicked");
// };


// ==========================================
// ✅ 2. Using addEventListener (Best Practice)
// ==========================================
// Advantages:
// - Multiple handlers allowed
// - Better control over propagation
// - Supports bubbling and capturing phases

document.getElementById('img2').addEventListener('click', function () {
    alert("Image 2 clicked");
}, false);

// mouseenter → triggers when mouse enters the element
// document.getElementById('img2').addEventListener('mouseenter', function () {
//     alert("Mouse entered Image 2");
// }, false);


// ==========================================
// 3️⃣ Older Methods (For Knowledge)
// ==========================================
// - attachEvent() → Used in older IE browsers (deprecated)
// - jQuery → uses .on() for event handling


// ==========================================
// 4️⃣ Event Object (e)
// ==========================================
//
// When an event occurs, the browser passes an event object (e)
// to the handler containing information about the event.
//
// Important properties of the event object:

// 1. type → Name of the event (click, mouseenter, etc.)
// 2. timeStamp → Time when the event occurred (milliseconds)
// 3. defaultPrevented → True if default action was prevented
// 4. target → The actual element on which the event occurred
// 5. currentTarget → The element to which event listener is attached
// 6. clientX, clientY → Mouse coordinates relative to browser window
// 7. screenX, screenY → Mouse coordinates relative to screen
// 8. ctrlKey, shiftKey, altKey → Check if these keys were pressed
// 9. keyCode → For keyboard events


document.getElementById('img2').addEventListener('click', function(e) {

    console.log("Full Event Object:", e);

    // Basic Info
    console.log("Event Type:", e.type); 
    console.log("Event TimeStamp:", e.timeStamp);
    console.log("Default Prevented?", e.defaultPrevented);

    // Element Info
    console.log("Event Target (clicked element):", e.target);
    console.log("Current Target (listener attached to):", e.currentTarget);

    // Mouse Position
    console.log("Mouse Position in Window (clientX, clientY):", e.clientX, e.clientY);
    console.log("Mouse Position on Screen (screenX, screenY):", e.screenX, e.screenY);

    // Modifier Keys
    console.log("Ctrl Key pressed?", e.ctrlKey);
    console.log("Shift Key pressed?", e.shiftKey);
    console.log("Alt Key pressed?", e.altKey);

}, true); // true → capturing phase

/*
========================================
5️⃣ Event Propagation
========================================
- Bubbling (default) → Event moves from child → parent
- Capturing → Event moves from parent → child
- addEventListener(type, callback, useCapture)
    useCapture = true → capturing
    useCapture = false → bubbling
*/


/*
========================================
💡 Why Event Object is Important
========================================
- Allows event delegation
- Identifies exact clicked element
- Needed for advanced interactions:
    • Drag & Drop
    • Keyboard shortcuts
    • Games / Dynamic UI
*/

</script>
</html>
