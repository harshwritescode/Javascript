<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Number Game</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="wrapper">
        <h1>Number Guessing Game</h1>
        <p>Try and guess a random number between 1 and 100</p>
        <p>You have 10 attempts to guess the right number</p>
        <br>

        <form action="" class="form">
            <label for="guessField" id="guess">Guess a Number</label>
            <input type="text" id="guessfield" class="guessField">
            <input type="submit" id="subt" value="submit press" class="guesssubmit">
        </form>

        <div class="resultparas">
            <p>Previous Guesses: <span class="guesses"></span> </p>
            <p>Guesses Remaining: <span class="lastResult">10</span> </p>
            <p class="loworHi"></p>
        </div>
    </div>
</body>
<script>
    let randomNumber=(parseInt(Math.random()*100+1));
    console.log(randomNumber);
    
    const submit=document.querySelector('#subt');
    const userInput=document.querySelector('.guessField');
    const guessSlot=document.querySelector('.guesses');
    const remainingSlot=document.querySelector('.lastResult')
    const loworHi=document.querySelector('.loworHi');
    const startOver=document.querySelector('.resultparas');

    const p=document.createElement('p');

    let prevGuess=[];
    let numGuess= 1;
    let playGame= true;

    if(playGame){
        submit.addEventListener('click',(e)=>{
        e.preventDefault();
        const guess=parseInt(userInput.value);
        console.log(guess);
        validateGuess(guess)
        })
    }

    function validateGuess(guess){
       if(isNaN(guess)){
        alert('Please enter a valid number')
       }else if(guess<1){
         alert('Please enter a number more than 1')
       } 
       else if(guess>100){
         alert('Please enter a number below 100')
       } 
       else{
        prevGuess.push(guess);
        if(numGuess>10){
            displayGuess(guess);
            displayMessage(`Game Over. Random numer was ${randomNumber} `)
             endGame();
        }
        else{
            displayGuess(guess);
            checkguess(guess)
        }
       }
    }

    function checkguess(guess){
       if(guess==randomNumber){
          displayMessage(`You guessd it right`);
       }
       else if(guess<randomNumber){
        displayMessage(`Numbered is Too LOw`);
       }
       else if(guess>randomNumber){
        displayMessage(`Numbered is Too High`);
       }
    }

    function displayMessage(message){
      loworHi.innerHTML =`<h2>${message}</h2>`;
    }
    function displayGuess(guess){
          userInput.value='';
          guessSlot.innerHTML+=`${guess} `;
          numGuess++;
          remainingSlot.innerHTML=`${11 - numGuess}`
    }
    function newGame(){
       const newGameButton=document.querySelector('#newGame');
       newGameButton.addEventListener('click',(e)=>{
        randomNumber=(parseInt(Math.random()*100+1))
        prevGuess=[];
        numGuess=1;
        guessSlot.innerHTML='';
         remainingSlot.innerHTML=`${11 - numGuess}`
         userInput.removeAttribute('disabled');
         startOver.removeChild(p)
       })
    }
    function endGame(){
     userInput.value='';
     userInput.setAttribute('disabled','')
     p.classList.add('button')
     p.innerHTML=`<h1 id="newGame">Start New Game</h1>`
     startOver.appendChild(p);
     playGame=false;
     newGame();
    }



</script>
</html>
